<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Order | Agneetta’s Macarons</title>

<style>
:root{
  --bg:#0f1220;
  --text:#f2f4ff;
  --muted:#b8bfdc;
  --accent:#ff7aa2;
  --accent2:#7cf0d6;
  --border:rgba(255,255,255,.10);
}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}
a{text-decoration:none;color:inherit}
.nav{
  padding:20px;
  display:flex;
  justify-content:space-between;
  background:rgba(15,18,32,.9);
  border-bottom:1px solid var(--border);
}
.btn{
  padding:10px 16px;
  border-radius:12px;
  font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#111;
}
.wrap{
  max-width:800px;
  margin:0 auto;
  padding:50px 24px;
}
h1{margin-bottom:10px}
p{color:var(--muted)}
input,textarea,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#1b2036;
  color:white;
  margin-top:6px;
}
textarea{min-height:100px}
form div{margin-bottom:15px}
</style>
</head>

<body>

<div class="nav">
  <div><strong>Agneetta’s Macarons</strong></div>
  <div>
    <a href="index.html">Home</a>
  </div>
</div>

<div class="wrap">
  <h1>Order / Inquiry</h1>
  <p>Dallas • Lead time: 48–72 hours</p>
  <p><strong>Cancellation policy:</strong> Full refund up to two days before pickup.</p>

  <form id="form">
    <div>
      <label>Name</label>
      <input id="name" required>
    </div>
    <div>
      <label>Email</label>
      <input id="email" type="email" required>
    </div>
    <div>
      <label>Details</label>
      <textarea id="details"></textarea>
    </div>
    <button class="btn" type="submit">Send Inquiry</button>
  </form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const details = document.getElementById("details").value;

  const subject = encodeURIComponent("Macaron Inquiry - " + name);
  const body = encodeURIComponent("Name: " + name + "\nEmail: " + email + "\n\nDetails:\n" + details);

  window.location.href = "mailto:YOUR_EMAIL@EMAIL.COM?subject=" + subject + "&body=" + body;
});
</script>

<!-- Chatling chatbot -->
<script>
window.chtlConfig = { chatbotId: "2137513927" }
</script>
<script async data-id="2137513927" id="chtl-script"
type="text/javascript"
src="https://chatling.ai/js/embed.js"></script>

</body>
</html>
